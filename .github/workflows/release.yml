name: Release

# Stage 3 of the promote cascade (deployment.md Promotion-and-release): roma-matcher's
# promote.yml dispatches `promote-release` with the version once the release image exists on
# Harbor. This bumps the pinned tag, commits + pushes master, and pushes the git tag that
# AutoUpdater detects.

on:
  repository_dispatch:
    types: [promote-release]

permissions:
  contents: write

env:
  REGISTRY: docker.modelingevolution.com
  HARBOR_PROJECT: roma-matcher
  HARBOR_REPO: roma-matcher

jobs:
  release:
    runs-on: [self-hosted, x64, hyperion]

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate dispatch payload
        id: payload
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::client_payload.version '${VERSION}' is not X.Y.Z"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release image exists on Harbor
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          if ! curl -fsSL -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "https://${REGISTRY}/api/v2.0/projects/${HARBOR_PROJECT}/repositories/${HARBOR_REPO}/artifacts?page_size=100&with_tag=true" \
            | jq -r '.[].tags[]?.name' | grep -Fxq "${VERSION}"; then
            echo "::error::${REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPO}:${VERSION} not found on Harbor — refusing to tag a release with no image"
            exit 1
          fi
          echo "Verified ${HARBOR_PROJECT}/${HARBOR_REPO}:${VERSION} on Harbor"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pin version and release
        env:
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          set -euo pipefail
          # release.sh runs `update-version.sh set` internally before committing/tagging.
          ./release.sh "${VERSION}" -m "release: v${VERSION}"
