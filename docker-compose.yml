name: roma-matcher

# Deploy package for the RoMa matcher (Epic 029 · Feature 005).
#
# AutoUpdater pulls the pinned Harbor image and runs it; this file never builds.
# `up -d`:  docker compose -f docker-compose.yml -f docker-compose.x64.yml up -d   # x86_64
#           docker compose -f docker-compose.yml -f docker-compose.arm64.yml up -d # ARM64
#
# `docker compose config` validates on any host; `up` needs an NVIDIA-GPU host with the
# container runtime registered (the service sets `runtime: nvidia`). Weights (~1.6 GB) are
# baked into the image — no host weights dir, no runtime provisioning.

services:
  roma-matcher:
    image: docker.modelingevolution.com/roma-matcher/roma-matcher:1.3.2
    container_name: roma-matcher
    restart: unless-stopped

    # GPU on every target via the legacy runtime (deployment.md GPU row).
    runtime: nvidia

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ROMA_WEIGHTS_DIR=/models
      - ROMA_DEVICE=cuda
      - ROMA_HOST=0.0.0.0
      - ROMA_PORT=7662
      # Per-device tuning (F008 design §7): each knob reads from a gitignored /data/roma-matcher/.env
      # (Compose loads ./.env for ${VAR} substitution); `:-default` keeps the fleet default when the
      # var is absent, so an untuned device behaves exactly as before. AutoUpdater's `git checkout`
      # never deletes untracked files, so a device-local .env survives updates.
      - ROMA_BG_ALIGN_MODEL=${ROMA_BG_ALIGN_MODEL:-affine}
      - ROMA_BG_ALIGN_MAX_ITERS=${ROMA_BG_ALIGN_MAX_ITERS:-4}
      - ROMA_BG_ALIGN_MAX_SHIFT=${ROMA_BG_ALIGN_MAX_SHIFT:-30}
      - ROMA_BG_THRESHOLD=${ROMA_BG_THRESHOLD:-0}
      - ROMA_BG_MORPH_OPEN=${ROMA_BG_MORPH_OPEN:-3}
      - ROMA_BG_MORPH_CLOSE=${ROMA_BG_MORPH_CLOSE:-25}
      - ROMA_BG_MASK_MARGIN_PX=${ROMA_BG_MASK_MARGIN_PX:-16}
      # Coverage safety cap: if a masked frame's foreground exceeds this fraction the reference failed
      # to isolate the part, so the request falls back to crop mode (per-device tunable).
      - ROMA_BG_MAX_MASK_COVERAGE=${ROMA_BG_MAX_MASK_COVERAGE:-0.85}
      - ROMA_FEATURE_CACHE_SIZE=${ROMA_FEATURE_CACHE_SIZE:-0}
      # Per-run /match debug dump (inputs, masks, padded frames, result.json) for operator
      # inspection of background removal. Lands in the host volume below; keep bounds retention.
      # Set ROMA_DEBUG_DUMP_DIR="" in the device .env to disable (zero overhead).
      - ROMA_DEBUG_DUMP_DIR=${ROMA_DEBUG_DUMP_DIR:-/data/match-dumps}
      - ROMA_DEBUG_DUMP_KEEP=${ROMA_DEBUG_DUMP_KEEP:-7}

    # Loopback-only publish: the host-network app reaches it at 127.0.0.1:7662, no external interface.
    ports:
      - "127.0.0.1:7662:7662"

    # Debug dumps land on the host so an operator can browse them (deployment data-mount convention).
    volumes:
      - /var/docker/data/roma-matcher/match-dumps:/data/match-dumps

    # The python image has no curl, so the check uses urllib. start_period covers the
    # model load + weights warm-up.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7662/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "10"
