# ARM64 override — selected by AutoUpdater on `uname -m` = aarch64 and layered:
#   docker compose -f docker-compose.yml -f docker-compose.arm64.yml up -d
# Pulls the multi-arch Harbor image (arm64 manifest); never builds.

services:
  roma-matcher:
    image: docker.modelingevolution.com/roma-matcher/roma-matcher:1.2.1
    platform: linux/arm64
